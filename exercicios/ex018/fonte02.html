<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'Love';
            src: url('fonts/love.larry.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

    
        /*
            Tipos de Format()
            - opentype (otf)
            - truetype (ttf)
            - embedded-opentype
            - truetype-aat (Apple Advanced Typography)
            - svg

        */
        body {
            font-family: Arial, Helvetica, sans-serif;

        }
        h1 {
            font-family: 'Love', Times, serif;
            font-weight: normal;
            text-align: center;
            font-size: 3em;
        }
    </style>
</head>
<body>
    <h1>Olá, Jotavê!</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Praesentium ipsam quae cumque provident harum tenetur facilis, autem deserunt accusamus exercitationem non cupiditate soluta totam dolorem pariatur amet magnam consequuntur eius.</p>
</body>
</html>
